name: Frontend CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Unit tests
        run: pnpm test

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mu-hub-frontend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mu-hub-frontend:${{ github.sha }} \
            .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mu-hub-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mu-hub-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/manuhub
            docker compose -f docker-compose-prod.yml pull manu-front
            docker compose -f docker-compose-prod.yml up -d --no-deps manu-front
